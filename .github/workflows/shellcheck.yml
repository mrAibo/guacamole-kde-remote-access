name: shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Bash syntax
        run: for f in scripts/*.sh; do bash -n "$f"; done
      - name: ShellCheck
        run: shellcheck -x scripts/*.sh
